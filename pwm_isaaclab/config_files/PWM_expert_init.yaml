Task: "JointTrainAgent"

BasicSettings:
  Seed: 0
  ObsShape: 0
  UseAmp: True
  FrameSkip: 1

JointTrainAgent:
  SampleMaxSteps: 10000000
  BufferMaxLength: 4000000
  BufferWarmUp: 51200
  NumEnvs: 64
  BatchSize: 64
  BatchLength: 64
  ImagineBatchSize: 64
  ImagineContext: 16
  ImagineHorizon: 15
  TrainModelEverySteps: 256
  TrainAgentEverySteps: 256
  ModelUpdate: 4
  AgentUpdate: 4
  SaveEverySteps: 250000
  VideoLogStep: 2000

Models:
  Hidden: 320
  NumBin: 255
  MaxBin: 20
  Act: "SiLU"
  Stoch: 24
  Discrete: 16
  Gamma: 0.99
  Lambda: 0.95
  Tau: 0.01

  WorldModel:
    Stem: 32
    MinRes: 4
    DynScale: 0.75
    RepScale: 0.15
    ValScale: 1.25
    KLFree: 1.0
    LR: 8e-5
    Eps: 1e-8

  Agent:
    EntropyCoef: 3e-4
    MinStd: 0.1
    MaxStd: 1.0
    LR: 8e-5
    Eps: 1e-5
    MinPer: 0.05
    MaxPer: 0.95
    EMADecay: 0.99
    UseSlowCritic: False

ForceHead:
  Enable: True
  Key: ""
  HiddenDim: 160
  Depth: 3
  Dropout: 0.1
  SignedForce: False
  Threshold: 0.25
  LossWeight: 0.25
  DetachLatent: False

ForceLoss:
  Eps: 1e-3
  ForceScale: 0.5
  LambdaCls: 1.5
  LambdaReg: 2.0
  LambdaSign: 0.5
  FocalAlpha: 0.85
  FocalGamma: 2.0
  HuberBeta: 0.25
  RegWeightPower: 0.5
  RegWeightMax: 6.0

expert:
  enabled: true
  path: null
  format: "npz"
  preload_to_replay: true
  pretrain_world_model: true
  pretrain_steps: 50000
  bc_init: true
  bc_steps: 20000
  bc_batch_size: null
  bc_lr: null
  online_bc_reg: false
  online_bc_weight: 0.0
  online_bc_decay: 1.0
  replace_random_prefill: true
  keep_expert_in_replay: true
  expert_ratio_online: 0.2
  validate_expert_shapes: true
  save_init_checkpoints: true
  skip_pretrain_if_checkpoint_exists: false
  load_pretrained_world_model_path: null
  load_bc_actor_path: null
  validation_ratio: 0.05
  log_interval: 100
  action_tolerance: 1e-4
  cost_head_mode: "hurdle"
  cost_target_source: "force_margin"
  cost_pipe_force_limit: 1.0
  cost_bottom_force_limit: 1.0
  cost_pipe_force_channels: [1, 4]
  cost_bottom_force_channels: [2, 5]
  cost_balanced_sequence_ratio: 0.3
  cost_loss_type: "auto"
  cost_loss_weight: 2.0
  cost_cls_weight: 1.0
  cost_reg_weight: 1.0
  cost_prior_loss_weight: 0.5
  cost_focal_alpha: 0.75
  cost_focal_gamma: 2.0
  cost_pos_weight_max: 200.0
  cost_huber_beta: 0.5
  # Extra world-model-only coverage data. These trajectories are used for
  # world model pretraining, but actor BC still uses only expert.path.
  wm_coverage_paths: []
  wm_coverage_format: "npz"
  wm_coverage_max_episodes: 0
  wm_coverage_validation_ratio: 0.05

replay:
  store_source: true
  store_cost: true
  store_safety_margin: true
  store_uncertainty_placeholder: true

logging:
  log_expert_init_metrics: true

Wandb:
  Project: "IsaacLab-PSSM"
  Group: "expert-init"
