Task: "JointTrainAgent"

BasicSettings:
  Seed: 0
  ObsShape: 0
  UseAmp: True
  FrameSkip: 1

JointTrainAgent:
  SampleMaxSteps: 10000000
  BufferMaxLength: 10000000
  BufferWarmUp: 51200
  NumEnvs: 64
  BatchSize: 64
  BatchLength: 64
  ImagineBatchSize: 64
  ImagineContext: 16
  ImagineHorizon: 15
  TrainModelEverySteps: 256
  TrainAgentEverySteps: 256
  ModelUpdate: 4
  AgentUpdate: 4
  SaveEverySteps: 250000
  VideoLogStep: 2000
  SaveOfflineEpisodes: False
  OfflineDatasetDir: ""

Models:
  Hidden: 320
  NumBin: 255
  MaxBin: 20
  Act: "SiLU"
  Stoch: 24
  Discrete: 16
  Gamma: 0.99
  Lambda: 0.95
  Tau: 0.01

  WorldModel:
    Stem: 32
    MinRes: 4
    DynScale: 0.75
    RepScale: 0.15
    ValScale: 1.25
    KLFree: 1.0
    LR: 8.0e-5
    Eps: 1.0e-8

  Agent:
    EntropyCoef: 3.0e-4
    MinStd: 0.1
    MaxStd: 1.0
    LR: 8.0e-5
    Eps: 1.0e-5
    MinPer: 0.05
    MaxPer: 0.95
    EMADecay: 0.99
    UseSlowCritic: False

ForceHead:
  Enable: True
  Key: ""
  HiddenDim: 160
  Depth: 3
  Dropout: 0.1
  SignedForce: False
  Threshold: 0.25
  LossWeight: 0.25
  DetachLatent: False

ForceLoss:
  Eps: 1.0e-3
  ForceScale: 0.5
  LambdaCls: 1.5
  LambdaReg: 2.0
  LambdaSign: 0.5
  FocalAlpha: 0.85
  FocalGamma: 2.0
  HuberBeta: 0.25
  RegWeightPower: 0.5
  RegWeightMax: 6.0

Wandb:
  Project: "IsaacLab-PSSM-DFD-V4"

Env:
  MakeKwargs:
    num_envs: 64
    use_fabric: True

FDPIRegimeDreamer:
  Replay:
    cost_positive_ratio: 0.0

  WarmupSampling:
    NoiseStd: 0.50
    GreedyBase: false

  ContinuousCost:
    Enable: true
    ForceThreshold: 0.1
    LowForceScale: 0.05
    CostForceMax: 15.0
    ForceScale: 5.0
    ExtremeForceThreshold: 5.0
    ClipCost: true
    CostMin: 0.0
    CostMax: 1.0
    BottomForceChannels: [2, 5]

  CostHead:
    Enable: true
    HiddenDim: 320
    Depth: 3
    LossWeight: 2.0
    HuberBeta: 0.02
    SmallForceThreshold: 0.3
    SmallCostThreshold: 0.05
    SmallCostWeight: 2.0
    ExtremeLossWeight: 0.5
    ExtremeCostWeight: 4.0
    PriorLossWeight: 0.5

  RiskCritic:
    GammaCost: 0.97
    RiskMax: 1.0
    TargetTau: 0.005
    Pf: 0.40
    Cg: 0.15

  Gp:
    Enable: true
    GammaCost: 0.97
    RiskMax: 1.0
    TargetTau: 0.005
    SourceAwareWeight: true
    HighCostWeight: 3.0
    DualSourceWeight: 1.0
    BoundaryWeight: 3.0
    HighCostThreshold: 0.1
    BoundaryLow: 0.05
    BoundaryHigh: 0.4
    SafetyCriticalRatio: 0.30
    HiddenDim: 256
    NumLayers: 2
    LR: 1.0e-4
    Eps: 1.0e-8
    UpdateSteps: 1

  Gd:
    Enable: true
    GammaCost: 0.97
    RiskMax: 1.0
    TargetTau: 0.005
    SourceAwareWeight: true
    HighCostWeight: 4.0
    DualSourceWeight: 3.0
    BoundaryWeight: 3.0
    HighCostThreshold: 0.1
    BoundaryLow: 0.05
    BoundaryHigh: 0.4
    SafetyCriticalRatio: 0.55
    HiddenDim: 256
    NumLayers: 2
    LR: 1.0e-4
    Eps: 1.0e-8
    UpdateSteps: 1

  MainFDPIRegime:
    Enable: true
    StartStep: 1000000
    LambdaCri: 0.006
    LambdaInf: 0.012
    MinRewardWeightCri: 0.60
    MinRewardWeightInf: 0.20
    WarmupSteps: 100000
    EntropyCoef: 1.0e-4
    DetachActionForLogProb: true
    TailRiskCoef: 0.003
    TailRiskThreshold: 0.40

  DualPolicy:
    LR: 1.0e-4
    Eps: 1.0e-5
    InitFromMainActor: true

  DualSampling:
    Enable: true
    StartStep: 100000
    FeasibleRatioWindow: 10000
    RatioFea95: 0.25
    RatioFea90: 0.35
    RatioFea80: 0.25
    RatioCriticalHigh: 0.18
    RatioUnsafeHigh: 0.08
    RatioDefault: 0.12
    MaxKLForSampling: 250.0
    HighMainCostRate: 0.20
    MaxRatioWhenMainCostHigh: 0.12

  DualUpdate:
    Enable: true
    StartStep: 100000
    Type: "imagined_risk_return"
    Horizon: 5
    GammaCost: 0.97
    KLCoeff: 0.8
    EntropyCoef: 2.0e-4
    GradClipNorm: 100.0
    UpdateSteps: 1

  WorldModelSampling:
    EnableSafetyCriticalSampling: true
    UniformRatio: 0.70
    SafetyCriticalRatio: 0.30
    HighCostThreshold: 0.1
    BoundaryLow: 0.05
    BoundaryHigh: 0.4

  Checkpoint:
    SaveFullState: true
    SaveReplayBuffer: true
    SaveOptimizer: true
    FullStatePrefix: "full_state_v4"
